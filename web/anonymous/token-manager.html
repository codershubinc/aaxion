<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaxion - Token Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/web/styles.css">
</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white">
    <script src="/web/anonymous/auth-helper.js"></script>
    <script>
        // Check authentication on page load
        if (!checkAuth()) {
            // Will redirect in checkAuth if not authenticated
        } else {
            // nothing for now
        }
    </script>

    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1
                class="text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-purple-500 text-transparent bg-clip-text">
                <i class="fas fa-key mr-3"></i>Upload Token Manager
            </h1>
            <p class="text-gray-400 text-lg">Generate and manage upload tokens</p>
        </div>

        <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Generate Token Panel -->
            <div class="bg-slate-800/50 backdrop-blur-lg rounded-2xl shadow-2xl border border-slate-700/50 p-6">
                <h2 class="text-2xl font-bold mb-6 flex items-center">
                    <i class="fas fa-magic mr-3 text-purple-400"></i>Generate New Token
                </h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Target Directory</label>
                        <input type="text" id="targetDir" value="/home/swap/Downloads/temp_test/"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                        <p class="text-xs text-gray-500 mt-1">Where files will be uploaded</p>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Maximum Uploads</label>
                        <input type="number" id="maxUploads" value="1" min="1" max="100"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                        <p class="text-xs text-gray-500 mt-1">Number of files that can be uploaded with this token</p>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Expiry (Hours)</label>
                        <input type="number" id="expiryHours" value="24" min="1" max="168"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                        <p class="text-xs text-gray-500 mt-1">Token validity period (max 7 days)</p>
                    </div>

                    <button onclick="generateToken()"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 py-3 rounded-lg font-semibold transition-all transform hover:scale-105 shadow-lg">
                        <i class="fas fa-plus-circle mr-2"></i>Generate Token
                    </button>

                    <!-- Generated Token Result -->
                    <div id="tokenResult" class="hidden">
                        <div class="bg-green-900/30 border border-green-700 rounded-lg p-4 space-y-3">
                            <div class="flex items-center justify-between">
                                <label class="text-sm text-green-400 font-semibold">Token Generated!</label>
                                <i class="fas fa-check-circle text-green-400"></i>
                            </div>

                            <div>
                                <label class="text-xs text-gray-400 mb-1 block">Token</label>
                                <div class="flex gap-2">
                                    <input type="text" id="generatedToken" readonly
                                        class="flex-1 bg-slate-700/50 border border-slate-600 rounded-lg px-3 py-2 text-sm font-mono">
                                    <button onclick="copyToken()"
                                        class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-lg transition-all">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </div>

                            <div>
                                <label class="text-xs text-gray-400 mb-1 block">Upload URL</label>
                                <div class="flex gap-2">
                                    <input type="text" id="generatedURL" readonly
                                        class="flex-1 bg-slate-700/50 border border-slate-600 rounded-lg px-3 py-2 text-sm font-mono">
                                    <button onclick="copyURL()"
                                        class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition-all">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <div class="bg-slate-700/30 rounded p-2">
                                    <div class="text-gray-400">Target</div>
                                    <div class="font-mono" id="resultTargetDir"></div>
                                </div>
                                <div class="bg-slate-700/30 rounded p-2">
                                    <div class="text-gray-400">Max Uploads</div>
                                    <div class="font-bold" id="resultMaxUploads"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Active Tokens List -->
            <div class="bg-slate-800/50 backdrop-blur-lg rounded-2xl shadow-2xl border border-slate-700/50 p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold flex items-center">
                        <i class="fas fa-list mr-3 text-blue-400"></i>Active Tokens
                    </h2>
                    <button onclick="refreshTokens()"
                        class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg transition-all">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh
                    </button>
                </div>

                <div id="tokensList"
                    class="space-y-3 max-h-96 overflow-y-auto scrollbar-thin scrollbar-thumb-slate-700 scrollbar-track-slate-800">
                    <div class="text-center text-gray-400 py-8">
                        <i class="fas fa-key text-4xl mb-3 opacity-50"></i>
                        <p>Click Refresh to load active tokens</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast"
            class="hidden fixed top-4 right-4 bg-slate-800 border border-slate-700 rounded-lg shadow-2xl p-4 max-w-sm z-50">
            <div class="flex items-center gap-3">
                <i id="toastIcon" class="fas fa-info-circle text-2xl"></i>
                <div class="flex-1">
                    <div id="toastTitle" class="font-semibold"></div>
                    <div id="toastMessage" class="text-sm text-gray-400"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/web/anonymous/token-manager.js"></script>
</body>

</html>
