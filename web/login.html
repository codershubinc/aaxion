<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aaxion - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body
    class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen text-white flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <h1
                class="text-5xl font-bold mb-3 bg-gradient-to-r from-blue-400 to-purple-500 text-transparent bg-clip-text">
                Aaxion
            </h1>
            <p class="text-gray-400 text-lg">Sign in to manage your system</p>
        </div>

        <!-- Login/Register Card -->
        <div class="bg-slate-800/50 backdrop-blur-lg rounded-2xl shadow-2xl border border-slate-700/50 p-8">
            <!-- Tabs -->
            <div class="flex mb-6 bg-slate-700/30 rounded-lg p-1">
                <button id="loginTab" onclick="showLogin()"
                    class="flex-1 py-2 px-4 rounded-md transition-all font-semibold bg-blue-600 text-white">
                    Login
                </button>
                <button id="registerTab" onclick="showRegister()"
                    class="flex-1 py-2 px-4 rounded-md transition-all font-semibold text-gray-400 hover:text-white">
                    Register
                </button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Username</label>
                        <input type="text" id="loginUsername"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors"
                            placeholder="Enter username">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Password</label>
                        <input type="password" id="loginPassword"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors"
                            placeholder="Enter password">
                    </div>
                    <button onclick="login()"
                        class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 py-3 rounded-lg font-semibold transition-all transform hover:scale-105 shadow-lg">
                        <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                    </button>
                </div>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <div class="space-y-4">
                    <div class="bg-blue-900/30 border border-blue-700/50 rounded-lg p-3 text-sm text-blue-300">
                        <i class="fas fa-info-circle mr-2"></i>
                        First user registration creates the admin account
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Username</label>
                        <input type="text" id="registerUsername"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500 transition-colors"
                            placeholder="Choose username">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Password</label>
                        <input type="password" id="registerPassword"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500 transition-colors"
                            placeholder="Choose password">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Confirm Password</label>
                        <input type="password" id="registerPasswordConfirm"
                            class="w-full bg-slate-700/50 border border-slate-600 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500 transition-colors"
                            placeholder="Confirm password">
                    </div>
                    <button onclick="register()"
                        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 py-3 rounded-lg font-semibold transition-all transform hover:scale-105 shadow-lg">
                        <i class="fas fa-user-plus mr-2"></i>Create Account
                    </button>
                </div>
            </div>

            <!-- Error/Success Message -->
            <div id="message" class="hidden mt-4 p-3 rounded-lg text-sm"></div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="/" class="text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>Back to Home
            </a>
        </div>
    </div>

    <script>
        // Show/hide forms
        function showLogin() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginTab').classList.add('bg-blue-600', 'text-white');
            document.getElementById('loginTab').classList.remove('text-gray-400');
            document.getElementById('registerTab').classList.remove('bg-blue-600', 'text-white');
            document.getElementById('registerTab').classList.add('text-gray-400');
            hideMessage();
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('registerTab').classList.add('bg-blue-600', 'text-white');
            document.getElementById('registerTab').classList.remove('text-gray-400');
            document.getElementById('loginTab').classList.remove('bg-blue-600', 'text-white');
            document.getElementById('loginTab').classList.add('text-gray-400');
            hideMessage();
        }

        // Show message
        function showMessage(text, type = 'error') {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.classList.remove('hidden', 'bg-red-900/30', 'border-red-700', 'text-red-400', 'bg-green-900/30', 'border-green-700', 'text-green-400');

            if (type === 'error') {
                messageDiv.classList.add('bg-red-900/30', 'border', 'border-red-700', 'text-red-400');
            } else {
                messageDiv.classList.add('bg-green-900/30', 'border', 'border-green-700', 'text-green-400');
            }
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        // Login
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showMessage('Please enter username and password');
                return;
            }

            try {
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error || 'Login failed');
                }

                const data = await response.json();

                // Store token
                localStorage.setItem('authToken', data.token);
                localStorage.setItem('username', username);

                showMessage('Login successful! Redirecting...', 'success');

                // Redirect after short delay
                setTimeout(() => {
                    const redirectTo = new URLSearchParams(window.location.search).get('redirect') || '/admin/tokens';
                    window.location.href = redirectTo;
                }, 1000);

            } catch (error) {
                showMessage(error.message);
            }
        }

        // Register
        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerPasswordConfirm').value;

            if (!username || !password || !confirmPassword) {
                showMessage('Please fill in all fields');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters');
                return;
            }

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const error = await response.text();
                    throw new Error(error || 'Registration failed');
                }

                showMessage('Registration successful! Please login.', 'success');

                // Switch to login tab and pre-fill username
                setTimeout(() => {
                    showLogin();
                    document.getElementById('loginUsername').value = username;
                    document.getElementById('loginPassword').focus();
                }, 1500);

            } catch (error) {
                showMessage(error.message);
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const loginFormVisible = !document.getElementById('loginForm').classList.contains('hidden');
                if (loginFormVisible) {
                    login();
                } else {
                    register();
                }
            }
        });

        // Check if already logged in
        if (localStorage.getItem('authToken')) {
            const redirectTo = new URLSearchParams(window.location.search).get('redirect') || '/admin/tokens';
            window.location.href = redirectTo;
        }
    </script>
</body>

</html>
